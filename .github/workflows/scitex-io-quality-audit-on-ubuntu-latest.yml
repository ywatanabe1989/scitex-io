name: quality

# Nightly static audit of scitex-io against the ecosystem invariants
# enforced by `scitex-dev ecosystem audit-all` (PS/STX rule families).
# Catches regressions like a missing scitex-config dependency or a
# drifted CLI/MCP surface before they reach PyPI. Runs the audit
# against THIS checkout (--path .) so a leaf package validates its own
# tree without cloning the whole ecosystem. Uploads the audit log as an
# artifact and opens a rolling tracking issue if the audit fails.

on:
  schedule:
    - cron: "0 8 * * *"  # 08:00 UTC, after the 07:00 per-repo test runs
  workflow_dispatch:
  push:
    branches: [develop]
    paths:
      - "pyproject.toml"
      - "src/scitex_io/**"
      - ".github/workflows/scitex-io-quality-audit-on-ubuntu-latest.yml"

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout scitex-io
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install scitex-io + scitex-dev (auditor)
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -e ".[all,dev]" || pip install -e ".[dev]" || pip install -e .
          pip install scitex-dev

      - name: Import smoke (scitex_io)
        run: python -c "import scitex_io; print('import OK:', scitex_io.__version__)"

      - name: Run ecosystem audit-all against this checkout
        id: audit
        run: |
          set -euo pipefail
          # .venv-free: scitex-dev's audit-all spawns `scitex-dev` subcommands,
          # which resolve via the pip-installed console script on PATH.
          DIST=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['name'])")
          echo "::notice ::Auditing $DIST against $PWD"
          set +e
          scitex-dev ecosystem audit-all "$DIST" --path "$PWD" 2>&1 | tee audit.log
          rc=${PIPESTATUS[0]}
          set -e
          echo "rc=$rc" >> "$GITHUB_OUTPUT"
          exit "$rc"
        continue-on-error: true  # never block on findings; tracked via issue

      - name: Upload audit log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scitex-io-audit
          path: audit.log
          retention-days: 30

      - name: Open / update tracking issue on audit failure
        if: ${{ always() && steps.audit.outputs.rc != '0' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          body=$(printf '# scitex-io quality-audit failed\n\nGenerated: %s\n\n```\n%s\n```\n' \
            "$(date -u +%Y-%m-%dT%H:%M:%SZ)" "$(tail -c 60000 audit.log)")
          title="quality-audit: $(date -u +%Y-%m-%d) — FAILED"
          existing=$(gh issue list -R "$GITHUB_REPOSITORY" --label quality-audit --state open --json number,title \
              | python3 -c "import sys,json; d=json.load(sys.stdin); print(next((x['number'] for x in d if x['title'].startswith('quality-audit:')), ''))")
          if [ -n "$existing" ]; then
            gh issue comment "$existing" -R "$GITHUB_REPOSITORY" --body "$body"
            gh issue edit "$existing" -R "$GITHUB_REPOSITORY" --title "$title"
          else
            gh issue create -R "$GITHUB_REPOSITORY" --title "$title" --body "$body" \
              --label quality-audit || \
            gh issue create -R "$GITHUB_REPOSITORY" --title "$title" --body "$body"
          fi
